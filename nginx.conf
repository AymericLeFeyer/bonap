server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Proxy Marmiton/CIQUAL (parite addon HA)
    location ^~ /api/bonap/ {
        rewrite ^/api/bonap/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host 127.0.0.1;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 120s;
    }

    # Proxy Ollama local (utile si l'UI utilise /api/ollama)
    location ^~ /api/ollama/ {
        resolver 127.0.0.11 valid=10s;
        set $ollama_url "${LLM_OLLAMA_URL}";
        rewrite ^/api/ollama/(.*) /$1 break;
        proxy_pass $ollama_url;
        proxy_http_version 1.1;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Proxy /api vers Mealie (remplace le proxy Vite du dev)
    location ^~ /api/ {
        resolver 127.0.0.11 valid=10s;
        set $mealie_url "${VITE_MEALIE_URL}";
        proxy_pass $mealie_url;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_set_header Host $proxy_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Support SSE (streaming)
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 300s;
    }

    # Fichiers statiques avec cache long
    # Redirige les chemins relatifs mal résolus sur navigation directe vers une sous-route SPA
    # ex: /recipes/assets/index.js → /assets/index.js (base: './' dans Vite génère des paths relatifs)
    location ~ ^/[^/]+/(assets/.+)$ {
        rewrite ^/[^/]+/(assets/.+)$ /$1 last;
    }
    location ~ ^/[^/]+/env-config\.js$ {
        rewrite ^.*/env-config\.js$ /env-config.js last;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|svg|woff|woff2|ttf|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # env-config.js sans cache (injecté dynamiquement au démarrage du conteneur)
    location = /env-config.js {
        expires off;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    # SPA fallback : toutes les routes vers index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
