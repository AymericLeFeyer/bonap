name: Build and publish Docker image

on:
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ─── Étape 1 : tous les tests doivent passer avant de publier ───
  check:
    name: Lint, typecheck & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build

  unit:
    name: Unit tests (Vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run unit tests
        run: npm test

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(node -p "require('@playwright/test/package.json').version")" >> $GITHUB_OUTPUT
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
      - name: Install Playwright system deps only
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
      - name: Create .env for tests
        run: |
          echo "VITE_MEALIE_URL=http://localhost:9000" >> .env
          echo "VITE_MEALIE_TOKEN=fake-token-ci" >> .env
      - name: Start dev server
        run: npm run dev &
        env:
          VITE_MEALIE_URL: http://localhost:9000
          VITE_MEALIE_TOKEN: fake-token-ci
      - name: Wait for dev server to be ready
        run: npx wait-on http://localhost:5173 --timeout 60000
      - name: Run Playwright tests
        run: npm run test:e2e
      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ─── Étape 2 : build & push Docker si tous les tests passent ───
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: [check, unit, e2e]
    permissions:
      contents: write
      packages: write
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_ENV

      - name: Bump patch version
        id: version
        run: |
          npm version patch --no-git-tag-version
          echo "version=$(node -p "require('./package.json').version")" >> $GITHUB_OUTPUT

      - name: Commit and push version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json
          git commit -m "chore(release): v${{ steps.version.outputs.version }} [skip ci]"
          git push

      - name: Log in to the Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ─── Étape 3 : release GitHub + trigger aylabs-ha-addons ───
  release:
    name: Create GitHub release
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Install git-cliff
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        id: changelog
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          git-cliff --tag "v${VERSION}" --unreleased --strip all > /tmp/release_notes.md
          if ! grep -qE '\S' /tmp/release_notes.md; then
            echo "Maintenance, tests et corrections mineures." > /tmp/release_notes.md
          fi
          echo "notes_file=/tmp/release_notes.md" >> $GITHUB_OUTPUT

      - name: Create release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.build-and-push.outputs.version }}"
          if gh release view "v${VERSION}" &>/dev/null; then
            echo "Release v${VERSION} already exists, skipping."
          else
            gh release create "v${VERSION}" \
              --title "v${VERSION}" \
              --notes-file "${{ steps.changelog.outputs.notes_file }}" \
              --target main
          fi

      - name: Trigger aylabs-ha-addons update
        env:
          AYLABS_HA_TOKEN: ${{ secrets.AYLABS_HA_TOKEN }}
        run: |
          if [ -z "$AYLABS_HA_TOKEN" ]; then
            echo "AYLABS_HA_TOKEN secret not set, skipping cross-repo dispatch."
            exit 0
          fi
          curl -sf -X POST \
            -H "Authorization: Bearer ${AYLABS_HA_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/AyLabsCode/aylabs-ha-addons/dispatches \
            -d '{"event_type":"bonap-released","client_payload":{"version":"${{ needs.build-and-push.outputs.version }}"}}'
